<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC Digital Atlas — Geography & Current Affairs</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,ital,wght@6..72,0,300;6..72,0,400;6..72,0,500;6..72,0,600;6..72,1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   UPSC DIGITAL ATLAS — THEME SYSTEM
   ═══════════════════════════════════════════════════════════════ */
:root {
  --fs: 13px;
  --fs-sm: 11px;
  --fs-lg: 15px;
  --fs-h1: 28px;
  --fs-h2: 20px;
}

[data-theme="dark"] {
  --bg: #0B0E14; --surface: #141820; --surface2: #1C2130; --surface3: #252B3B;
  --border: #2A3044; --border-hi: #3A4060;
  --text: #E4E6ED; --text-dim: #8690A8; --text-muted: #5A637A;
  --accent: #3B82F6; --accent-soft: rgba(59,130,246,0.12);
  --accent2: #8B5CF6; --accent2-soft: rgba(139,92,246,0.10);
  --success: #22C55E; --danger: #EF4444; --warning: #F59E0B; --warning-soft: rgba(245,158,11,0.08);
  --map-filter: none;
  --card-glow: rgba(59,130,246,0.10);
  --overlay-bg: rgba(0,0,0,0.65);
  --radius: 12px; --radius-sm: 8px; --radius-xs: 5px;
  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Outfit', -apple-system, sans-serif;
}

[data-theme="light"] {
  --bg: #F0F2F5; --surface: #FFFFFF; --surface2: #F7F8FA; --surface3: #EBEDF2;
  --border: #D4D8E0; --border-hi: #B8BCC8;
  --text: #1A1D27; --text-dim: #5A6070; --text-muted: #8890A0;
  --accent: #2563EB; --accent-soft: rgba(37,99,235,0.08);
  --accent2: #7C3AED; --accent2-soft: rgba(124,58,237,0.06);
  --success: #16A34A; --danger: #DC2626; --warning: #D97706; --warning-soft: rgba(217,119,6,0.06);
  --map-filter: brightness(1.05) saturate(0.9);
  --card-glow: rgba(37,99,235,0.08);
  --overlay-bg: rgba(255,255,255,0.75);
  --radius: 12px; --radius-sm: 8px; --radius-xs: 5px;
  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Outfit', -apple-system, sans-serif;
}

/* shared vars applied via both themes */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: var(--fs); -webkit-font-smoothing: antialiased; transition: background 0.35s, color 0.35s; }
button, input, textarea, select { font-family: var(--font-body); font-size: var(--fs); }

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══ LANDING ═══ */
.landing { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:auto; padding:40px 20px; }
.landing-bg { position:fixed; inset:0; background:var(--bg); transition: background 0.35s; }
.landing-bg::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 30% 30%,var(--accent-soft) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 75% 70%,var(--accent2-soft) 0%,transparent 70%); }
.landing-bg::after { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(128,128,128,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(128,128,128,0.03) 1px,transparent 1px); background-size:80px 80px; }
.landing-content { position:relative; z-index:1; text-align:center; max-width:920px; }
.landing-badge { display:inline-flex; align-items:center; gap:8px; padding:7px 18px; border:1px solid var(--border); border-radius:24px; font-size:var(--fs-sm); font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:28px; }
.landing-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.landing-title { font-family:var(--font-display); font-size:clamp(48px,8vw,82px); font-weight:400; line-height:1.05; margin-bottom:8px; letter-spacing:-1px; }
.landing-geo { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.landing-tagline { font-family:var(--font-display); font-style:italic; font-size:clamp(16px,2.5vw,22px); color:var(--text-dim); margin-bottom:32px; font-weight:300; }
.landing-cards { display:flex; gap:20px; justify-content:center; margin-bottom:36px; flex-wrap:wrap; }
.landing-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px 26px; width:280px; text-align:left; cursor:pointer; transition:all 0.35s cubic-bezier(0.4,0,0.2,1); color:var(--text); position:relative; overflow:hidden; }
.landing-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--accent-soft),transparent 60%); opacity:0; transition:opacity 0.35s; }
.landing-card:hover { transform:translateY(-5px); border-color:var(--accent); box-shadow:0 16px 48px var(--card-glow); }
.landing-card:hover::before { opacity:1; }
.landing-card-icon { font-size:40px; margin-bottom:12px; position:relative; }
.landing-card h2 { font-family:var(--font-display); font-size:var(--fs-h1); font-weight:400; margin-bottom:6px; position:relative; }
.landing-card p { font-size:var(--fs-sm); color:var(--text-dim); line-height:1.6; margin-bottom:12px; position:relative; font-weight:300; }
.landing-card-count { font-size:var(--fs-sm); font-weight:600; color:var(--accent); position:relative; }
.landing-features { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:24px; }
.landing-feat { padding:7px 14px; background:var(--surface); border-radius:24px; font-size:var(--fs-sm); color:var(--text-dim); border:1px solid var(--border); font-weight:300; }
.landing-footer { font-size:var(--fs-sm); color:var(--text-muted); font-weight:300; margin-bottom:12px; }
.landing-bottom { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.landing-btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text-dim); cursor:pointer; font-size:var(--fs-sm); font-weight:500; transition:all 0.2s; }
.landing-btn:hover { border-color:var(--accent); color:var(--accent); }
.landing-btn input[type="file"] { display:none; }
.landing-controls { position:fixed; top:16px; right:16px; z-index:100; display:flex; gap:8px; }
.ctrl-btn { padding:7px 12px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text-dim); cursor:pointer; font-size:var(--fs-sm); transition:all 0.2s; display:flex; align-items:center; gap:4px; }
.ctrl-btn:hover { border-color:var(--accent); color:var(--text); }
.ctrl-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ═══ APP SHELL ═══ */
.app { height:100vh; display:flex; flex-direction:column; }
.topbar { display:flex; align-items:center; gap:8px; padding:5px 12px; background:var(--surface); border-bottom:1px solid var(--border); z-index:1000; flex-shrink:0; transition:background 0.35s; }
.topbar-left { display:flex; align-items:center; gap:8px; }
.topbar-back { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:var(--fs-sm); display:flex; align-items:center; gap:3px; padding:5px 7px; border-radius:5px; transition:background 0.15s; }
.topbar-back:hover { background:var(--surface2); }
.topbar-logo { font-family:var(--font-display); font-size:16px; }
.geo-text { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.mode-toggle { display:flex; gap:2px; background:var(--bg); border-radius:5px; padding:2px; }
.mode-toggle button { background:none; border:none; color:var(--text-dim); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:var(--fs-sm); font-weight:500; transition:all 0.2s; }
.mode-toggle button.active { background:var(--accent); color:#fff; }
.topbar-center { flex:1; display:flex; justify-content:center; }
.topbar-right { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
.tb { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 9px; border-radius:5px; cursor:pointer; font-size:var(--fs-sm); font-weight:500; transition:all 0.2s; white-space:nowrap; }
.tb:hover { background:var(--surface3); }
.tb.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.tb.adding { background:var(--danger); border-color:var(--danger); color:#fff; animation:pulse 1.5s infinite; }
.tb.slideshow { background:var(--success); border-color:var(--success); color:#fff; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
.add-banner { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; text-align:center; padding:6px; font-size:var(--fs-sm); font-weight:500; flex-shrink:0; }

/* Slideshow progress */
.slideshow-bar { height:3px; background:var(--border); flex-shrink:0; overflow:hidden; }
.slideshow-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.3s linear; }

/* ═══ SEARCH ═══ */
.search-box { position:relative; width:100%; max-width:340px; }
.search-wrap { display:flex; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:0 8px; transition:border-color 0.2s; }
.search-wrap:focus-within { border-color:var(--accent); }
.search-wrap input { flex:1; background:none; border:none; color:var(--text); padding:6px 0 6px 5px; font-size:var(--fs-sm); outline:none; }
.search-wrap input::placeholder { color:var(--text-muted); }
.search-results { position:absolute; top:calc(100%+4px); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; max-height:320px; overflow-y:auto; box-shadow:0 12px 48px rgba(0,0,0,0.4); z-index:2000; display:none; }
.search-results.open { display:block; }
.sr { display:flex; align-items:center; gap:7px; width:100%; padding:8px 10px; background:none; border:none; border-bottom:1px solid var(--border); color:var(--text); cursor:pointer; font-size:var(--fs-sm); text-align:left; transition:background 0.12s; }
.sr:last-child { border-bottom:none; }
.sr:hover { background:var(--surface2); }
.sr-type { margin-left:auto; font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }

/* ═══ FILTERS ═══ */
.filters { display:flex; align-items:center; gap:5px; padding:4px 12px; background:var(--surface); border-bottom:1px solid var(--border); z-index:999; flex-shrink:0; overflow-x:auto; scrollbar-width:none; transition:background 0.35s; }
.filters::-webkit-scrollbar { display:none; }
.chip { display:flex; align-items:center; gap:3px; padding:3px 8px; border-radius:14px; font-size:var(--fs-sm); font-weight:500; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.chip.on { color:#fff; border-color:transparent; }
.chip-ct { font-size:9px; opacity:0.7; }

/* ═══ MAP ═══ */
.map-area { flex:1; position:relative; overflow:hidden; display:flex; }
#map { flex:1; min-width:0; transition:filter 0.35s; }
.custom-marker { background:none!important; border:none!important; }

/* ═══ DASHBOARD SIDEBAR ═══ */
.dashboard { width:320px; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; padding:16px; transition:background 0.35s; scrollbar-width:thin; }
.dashboard::-webkit-scrollbar { width:4px; }
.dashboard::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.dash-title { font-family:var(--font-display); font-size:var(--fs-h2); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.dash-section { margin-bottom:16px; }
.dash-section h3 { font-size:var(--fs-sm); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:8px; }
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.dash-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; transition:all 0.2s; text-align:center; }
.dash-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 16px var(--card-glow); }
.dash-card.active { border-color:var(--accent); background:var(--accent-soft); }
.dash-card-icon { font-size:22px; margin-bottom:4px; }
.dash-card-count { font-size:18px; font-weight:700; color:var(--accent); }
.dash-card-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
.dash-card-full { grid-column:1/-1; }

/* Progress bars for revision */
.dash-progress { margin-bottom:10px; }
.dash-progress-label { display:flex; justify-content:space-between; font-size:var(--fs-sm); margin-bottom:4px; }
.dash-progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.dash-progress-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }

/* Quick list */
.dash-list { max-height:200px; overflow-y:auto; }
.dash-item { display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:5px; cursor:pointer; transition:background 0.15s; font-size:var(--fs-sm); }
.dash-item:hover { background:var(--surface2); }
.dash-item-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dash-item-name { flex:1; }
.dash-item-tag { font-size:9px; padding:1px 6px; border-radius:8px; background:var(--danger); color:#fff; font-weight:600; }

/* ═══ SIDE PANEL (over map) ═══ */
.panel { position:absolute; top:0; right:0; width:400px; max-width:92vw; height:100%; background:var(--surface); border-left:1px solid var(--border); z-index:900; overflow-y:auto; box-shadow:-6px 0 40px rgba(0,0,0,0.3); animation:slideIn 0.28s cubic-bezier(0.4,0,0.2,1); padding:18px; scrollbar-width:thin; transition:background 0.35s; }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.panel-close { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); padding:6px 11px; border-radius:5px; cursor:pointer; font-size:var(--fs-sm); font-weight:500; transition:all 0.15s; margin-bottom:14px; }
.panel-close:hover { background:var(--surface3); color:var(--text); }

/* Detail */
.detail-head { display:flex; align-items:flex-start; gap:12px; padding:16px; margin-bottom:14px; background:var(--surface2); border-radius:8px; border-left:4px solid var(--accent); }
.detail-icon { font-size:32px; flex-shrink:0; }
.detail-head h2 { font-family:var(--font-display); font-size:var(--fs-h2); font-weight:400; margin-bottom:6px; line-height:1.2; }
.badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:600; color:#fff; letter-spacing:0.3px; }
.badge-pyq { background:var(--danger); margin-left:5px; }
.detail-coords { font-size:var(--fs-sm); color:var(--text-muted); font-family:monospace; margin-bottom:12px; letter-spacing:0.5px; }
.info-box { background:var(--bg); border-radius:8px; padding:14px; border:1px solid var(--border); margin-bottom:10px; transition:background 0.35s; }
.info-box h3 { font-size:var(--fs-sm); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.info-box p { font-size:var(--fs); line-height:1.75; font-weight:300; }
.info-box.upsc { border-color:var(--warning); background:var(--warning-soft); }
.info-box.upsc h3 { color:var(--warning); }
.info-box.notes { border-color:var(--accent2); background:var(--accent2-soft); }
.info-box.notes h3 { color:var(--accent2); }
.del-btn { padding:6px 14px; background:var(--danger); color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:var(--fs-sm); font-weight:500; margin-top:6px; }

/* Slideshow nav in detail */
.slide-nav { display:flex; gap:8px; margin-top:12px; }
.slide-nav button { flex:1; padding:7px; border:1px solid var(--border); border-radius:5px; background:var(--surface2); color:var(--text); cursor:pointer; font-size:var(--fs-sm); transition:all 0.2s; }
.slide-nav button:hover { border-color:var(--accent); }

/* ═══ QUIZ ═══ */
.quiz-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.quiz-head h2 { font-family:var(--font-display); font-size:var(--fs-h2); }
.quiz-score { text-align:center; padding:7px; background:var(--bg); border-radius:5px; font-size:var(--fs); font-weight:600; margin-bottom:12px; color:var(--accent); border:1px solid var(--border); }
.quiz-q { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:18px; }
.quiz-q-text { font-size:var(--fs); line-height:1.75; margin-bottom:14px; white-space:pre-line; font-weight:300; }
.quiz-opts { display:flex; flex-direction:column; gap:6px; }
.qo { display:flex; align-items:center; gap:9px; padding:10px 12px; background:var(--surface); border:1px solid var(--border); border-radius:5px; color:var(--text); cursor:pointer; font-size:var(--fs); text-align:left; transition:all 0.18s; font-weight:300; }
.qo:hover { border-color:var(--accent); background:var(--surface2); }
.qo.correct { border-color:var(--success); background:rgba(34,197,94,0.08); }
.qo.wrong { border-color:var(--danger); background:rgba(239,68,68,0.08); }
.qo-letter { display:flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--surface2); font-size:var(--fs-sm); font-weight:600; flex-shrink:0; }
.quiz-exp { margin-top:12px; padding:12px; background:var(--surface); border-radius:5px; border:1px solid var(--border); }
.quiz-exp strong { display:block; margin-bottom:5px; }
.quiz-exp p { font-size:var(--fs); line-height:1.65; color:var(--text-dim); margin-bottom:10px; font-weight:300; }
.btn { padding:7px 16px; border-radius:5px; font-size:var(--fs-sm); font-weight:500; cursor:pointer; border:1px solid var(--border); transition:all 0.2s; }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-primary:hover { filter:brightness(1.1); }

/* ═══ NOTES ═══ */
.notes-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.notes-head h2 { font-family:var(--font-display); font-size:var(--fs-h2); }
.notes-form { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.notes-form input, .notes-form textarea { padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); outline:none; transition:border-color 0.2s; }
.notes-form input:focus, .notes-form textarea:focus { border-color:var(--accent); }
.note-card { background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:12px; margin-bottom:7px; }
.note-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.note-top h3 { font-size:var(--fs); font-weight:600; }
.note-date { font-size:9px; color:var(--text-muted); }
.note-card p { font-size:var(--fs-sm); color:var(--text-dim); line-height:1.6; font-weight:300; }
.note-del { background:none; border:none; color:var(--danger); font-size:var(--fs-sm); cursor:pointer; margin-top:4px; }

/* ═══ MODAL ═══ */
.modal-overlay { position:fixed; inset:0; background:var(--overlay-bg); display:flex; align-items:center; justify-content:center; z-index:2000; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; box-shadow:0 12px 48px rgba(0,0,0,0.4); }
.modal h2 { font-family:var(--font-display); font-size:22px; margin-bottom:4px; }
.modal-coords { font-size:var(--fs-sm); color:var(--text-muted); font-family:monospace; margin-bottom:16px; }
.modal label { display:block; font-size:10px; font-weight:600; color:var(--text-dim); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
.modal input, .modal textarea, .modal select { display:block; width:100%; margin-top:4px; padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); outline:none; transition:border-color 0.2s; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
.btn-secondary { background:var(--surface2); color:var(--text); }

/* ═══ STATS BAR ═══ */
.stats { display:flex; gap:14px; justify-content:center; align-items:center; padding:4px 12px; background:var(--surface); border-top:1px solid var(--border); font-size:var(--fs-sm); color:var(--text-muted); z-index:1000; flex-shrink:0; font-weight:300; transition:background 0.35s; }

/* ═══ PDF EXPORT MODAL ═══ */
.pdf-modal { max-width:500px; }
.pdf-cats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:12px 0; }
.pdf-cat { display:flex; align-items:center; gap:6px; padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:5px; cursor:pointer; transition:all 0.2s; font-size:var(--fs-sm); }
.pdf-cat:hover { border-color:var(--accent); }
.pdf-cat.selected { border-color:var(--accent); background:var(--accent-soft); }
.pdf-cat input { accent-color:var(--accent); }
.pdf-progress { margin-top:12px; }
.pdf-progress-text { font-size:var(--fs-sm); color:var(--text-dim); margin-bottom:4px; }

/* ═══ RESPONSIVE ═══ */
@media (max-width:900px) {
  .dashboard { display:none; }
}
@media (max-width:768px) {
  .topbar { flex-wrap:wrap; gap:4px; }
  .topbar-center { order:3; flex-basis:100%; }
  .panel { width:100%; }
  .landing-cards { flex-direction:column; align-items:center; }
  .topbar-right { flex-wrap:wrap; }
}
</style>

let S = {
  mode:null, map:null, markers:[], selected:null,
  filters:Object.keys(CAT).reduce((a,k)=>(a[k]=true,a),{}),
  custom:[], notes:[], adding:false, panel:null,
  qi:0, qs:0, qa:0, qsel:null, qshow:false,
  theme:'dark', fontSize:13,
  slideshow:false, slideIdx:0, slideTimer:null, slideProgress:0,
  dashFilter:null, showDashboard:true,
  visited:new Set(),
};

try { const d=JSON.parse(localStorage.getItem('atlas')||'{}'); if(d.custom)S.custom=d.custom; if(d.notes)S.notes=d.notes; if(d.theme)S.theme=d.theme; if(d.fontSize)S.fontSize=d.fontSize; if(d.visited)S.visited=new Set(d.visited); } catch(e){}
document.body.dataset.theme=S.theme;
updateFontSize();

function save(){localStorage.setItem('atlas',JSON.stringify({custom:S.custom,notes:S.notes,theme:S.theme,fontSize:S.fontSize,visited:[...S.visited]}));}
function updateFontSize(){document.documentElement.style.setProperty('--fs',S.fontSize+'px');document.documentElement.style.setProperty('--fs-sm',(S.fontSize-2)+'px');document.documentElement.style.setProperty('--fs-lg',(S.fontSize+2)+'px');document.documentElement.style.setProperty('--fs-h1',Math.max(22,S.fontSize+15)+'px');document.documentElement.style.setProperty('--fs-h2',Math.max(18,S.fontSize+7)+'px');}
function data(){return S.mode==='india'?indiaData:worldData;}
function all(){return[...data(),...S.custom.filter(m=>{if(S.mode==='india')return m.lat>5&&m.lat<38&&m.lng>65&&m.lng<100;return true;})];}
function filtered(){let f=all().filter(m=>S.filters[m.type]!==false);if(S.dashFilter)f=f.filter(m=>m.type===S.dashFilter);return f;}

// SLIDESHOW
// ═══════════════════════════════════════════════════════════════════
function startSlideshow(){
  const items=filtered();if(items.length<2)return;
  S.slideshow=true;S.slideIdx=0;S.slideProgress=0;
  selectPlace(items[0]);
  advanceSlide();
}
function advanceSlide(){
  clearInterval(S.slideTimer);
  S.slideProgress=0;
  const bar=document.querySelector('.slideshow-bar-fill');
  S.slideTimer=setInterval(()=>{
    S.slideProgress+=3.33; // ~30 steps in 10s (every 333ms)
    if(bar)bar.style.width=S.slideProgress+'%';
    if(S.slideProgress>=100){
      S.slideIdx++;
      const items=filtered();
      if(S.slideIdx>=items.length)S.slideIdx=0;
      selectPlace(items[S.slideIdx]);
      S.slideProgress=0;
    }
  },333);
}
function stopSlideshow(){S.slideshow=false;clearInterval(S.slideTimer);S.slideTimer=null;S.slideProgress=0;render();}
function slidePrev(){const items=filtered();S.slideIdx=(S.slideIdx-1+items.length)%items.length;selectPlace(items[S.slideIdx]);S.slideProgress=0;clearInterval(S.slideTimer);advanceSlide();}
function slideNext(){const items=filtered();S.slideIdx=(S.slideIdx+1)%items.length;selectPlace(items[S.slideIdx]);S.slideProgress=0;clearInterval(S.slideTimer);advanceSlide();}

function pdfSelectAll(v){document.querySelectorAll('.pdf-cat input').forEach(cb=>{cb.checked=v;cb.closest('.pdf-cat').classList.toggle('selected',v);});}

function generatePdf(){
  const cats=[...document.querySelectorAll('.pdf-cat input:checked')].map(cb=>cb.value);
  if(!cats.length)return alert('Select at least one category');
  const items=all().filter(m=>cats.includes(m.type));
  if(!items.length)return alert('No items in selected categories');

  document.getElementById('pdf-progress').style.display='block';
  document.getElementById('pdf-gen').disabled=true;

  setTimeout(()=>{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,ml=15,mr=15,mt=20,mb=15;
    const cw=pw-ml-mr;
    let y=mt;

    // Title page
    doc.setFont('helvetica','bold');doc.setFontSize(28);
    doc.setTextColor(37,99,235);
    doc.text('UPSC Digital Atlas',pw/2,80,{align:'center'});
    doc.setFontSize(14);doc.setTextColor(100);
    doc.text(`${S.mode==='india'?'India':'World'} Geography — ${items.length} Locations`,pw/2,95,{align:'center'});
    doc.setFontSize(10);
    doc.text(`Generated: ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`,pw/2,110,{align:'center'});
    doc.text(`Categories: ${cats.map(c=>CAT[c].label).join(', ')}`,pw/2,118,{align:'center'});

    // Group by category
    const grouped={};
    cats.forEach(c=>grouped[c]=items.filter(m=>m.type===c));

    let total=items.length,done=0;

    cats.forEach(catKey=>{
      const catItems=grouped[catKey];
      if(!catItems||!catItems.length)return;
      const cat=CAT[catKey];

      doc.addPage();y=mt;
      // Category header
      doc.setFillColor(37,99,235);doc.rect(ml,y-6,cw,10,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255);
      doc.text(`${cat.label.toUpperCase()} (${catItems.length})`,ml+4,y+1);
      y+=14;

      catItems.forEach((m,idx)=>{
        if(y>ph-mb-40){doc.addPage();y=mt;}

        // Item header
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(30);
        doc.text(`${idx+1}. ${m.name}`,ml,y);
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120);
        doc.text(`[${m.lat.toFixed(2)}°, ${m.lng.toFixed(2)}°]`,ml+cw,y,{align:'right'});
        y+=5;

        // Info
        if(m.info){
          doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(50);
          const lines=doc.splitTextToSize(m.info,cw-4);
          if(y+lines.length*4>ph-mb){doc.addPage();y=mt;}
          doc.text(lines,ml+2,y);
          y+=lines.length*4+2;
        }

        // UPSC Relevance
        if(m.upscRelevance){
          doc.setFillColor(255,247,230);doc.rect(ml,y-3,cw,4+doc.splitTextToSize(m.upscRelevance,cw-8).length*3.5,'F');
          doc.setDrawColor(245,158,11);doc.rect(ml,y-3,cw,4+doc.splitTextToSize(m.upscRelevance,cw-8).length*3.5,'S');
          doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(180,100,0);
          doc.text('UPSC RELEVANCE:',ml+2,y);
          doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(80);
          const uLines=doc.splitTextToSize(m.upscRelevance,cw-8);
          doc.text(uLines,ml+2,y+3.5);
          y+=uLines.length*3.5+8;
        }

        // Separator
        doc.setDrawColor(220);doc.line(ml,y,ml+cw,y);
        y+=5;

        done++;
        const pct=Math.round(done/total*100);
        document.getElementById('pdf-bar').style.width=pct+'%';
        document.getElementById('pdf-status').textContent=`Processing: ${m.name} (${done}/${total})`;
      });
    });

    doc.save(`UPSC-Atlas-${S.mode}-${new Date().toISOString().slice(0,10)}.pdf`);
    document.getElementById('pdf-status').textContent='✅ PDF downloaded!';
    document.getElementById('pdf-gen').disabled=false;
    setTimeout(()=>{document.getElementById('mc').innerHTML='';},1500);
  },100);
}

    if(!counts[k])return'';
    const isActive=S.filters[k]&&(!S.dashFilter||S.dashFilter===k);
    return `<button class="chip ${isActive?'on':''}" data-f="${k}" style="${isActive?`background:${v.color};border-color:${v.color}`:''}">${v.icon} ${v.label} <span class="chip-ct">${counts[k]}</span></button>`;
  }).join('');

  return `<div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-back" id="go-back">← <span class="topbar-logo"><span class="geo-text">Digital</span> Atlas</span></button>
        <div class="mode-toggle">
          <button class="${S.mode==='india'?'active':''}" id="m-india">🇮🇳 India</button>
          <button class="${S.mode==='world'?'active':''}" id="m-world">🌍 World</button>
        </div>
      </div>
      <div class="topbar-center">
        <div class="search-box">
          <div class="search-wrap"><span style="font-size:12px;color:var(--text-muted)">🔍</span><input id="si" placeholder="Search places..." autocomplete="off"></div>
          <div class="search-results" id="sr"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="tb ${S.slideshow?'slideshow':''}" id="b-slide">${S.slideshow?'⏹ Stop':'▶️ Revise'}</button>
        <button class="tb ${S.panel==='quiz'?'active':''}" id="b-quiz">🧠</button>
        <button class="tb ${S.panel==='notes'?'active':''}" id="b-notes">📝</button>
        <button class="tb ${S.adding?'adding':''}" id="b-add">${S.adding?'✕':'📌'}</button>
        <button class="tb" id="b-pdf" title="Download PDF">📥</button>
        <button class="tb" id="b-export" title="Export JSON">💾</button>
        <button class="ctrl-btn" onclick="toggleTheme()" style="padding:4px 8px">${S.theme==='dark'?'☀️':'🌙'}</button>
        <button class="ctrl-btn" onclick="changeFontSize(-1)" style="padding:4px 6px">A-</button>
        <button class="ctrl-btn" onclick="changeFontSize(1)" style="padding:4px 6px">A+</button>
      </div>
    </header>
    ${S.adding?'<div class="add-banner">Click anywhere on the map to add a new place</div>':''}
    ${S.slideshow?'<div class="slideshow-bar"><div class="slideshow-bar-fill" style="width:'+S.slideProgress+'%"></div></div>':''}
    <div class="filters">${chips}</div>
    <div class="map-area">
      <div id="map"></div>
      <div id="sp"></div>
      ${S.showDashboard?dashboardHTML(counts):''}
    </div>
    <div class="stats">
      <span>📍 ${filtered().length} shown</span>
      <span>✅ ${S.visited.size} visited</span>
      <span>📌 ${S.custom.length} custom</span>
      <span>📝 ${S.notes.length} notes</span>
      ${S.slideshow?`<span>▶️ ${S.slideIdx+1}/${filtered().length}</span>`:''}
    </div>
    <div id="mc"></div>
  </div>`;
}

function dashboardHTML(counts){
  const totalPlaces=all().length;
  const visitedCount=all().filter(m=>S.visited.has(m.id)).length;
  const pct=totalPlaces?Math.round(visitedCount/totalPlaces*100):0;
  const pyqItems=all().filter(m=>m.type==='pyq'||m.upscRelevance?.includes('PYQ'));
  const pyqVisited=pyqItems.filter(m=>S.visited.has(m.id)).length;

  const catCards=Object.entries(CAT).filter(([k])=>counts[k]).map(([k,v])=>
    `<div class="dash-card ${S.dashFilter===k?'active':''}" data-dc="${k}">
      <div class="dash-card-icon">${v.icon}</div>
      <div class="dash-card-count">${counts[k]}</div>
      <div class="dash-card-label">${v.label}</div>
    </div>`
  ).join('');

  // Recent PYQ list
  const pyqList=all().filter(m=>m.type==='pyq').slice(0,8).map(m=>
    `<div class="dash-item" data-di="${m.id}">
      <div class="dash-item-dot" style="background:${S.visited.has(m.id)?'var(--success)':'var(--danger)'}"></div>
      <span class="dash-item-name">${m.name}</span>
      ${m.upscRelevance?.match(/PYQ:\s*([\d,\s]+)/)?`<span class="dash-item-tag">${m.upscRelevance.match(/PYQ:\s*([\d,\s]+)/)[1].trim()}</span>`:''}
    </div>`
  ).join('');

  return `<div class="dashboard">
    <div class="dash-title">📊 Dashboard</div>

    <div class="dash-section">
      <h3>Revision Progress</h3>
      <div class="dash-progress">
        <div class="dash-progress-label"><span>Overall</span><span>${visitedCount}/${totalPlaces} (${pct}%)</span></div>
        <div class="dash-progress-bar"><div class="dash-progress-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      </div>
      <div class="dash-progress">
        <div class="dash-progress-label"><span>PYQ Locations</span><span>${pyqVisited}/${pyqItems.length}</span></div>
        <div class="dash-progress-bar"><div class="dash-progress-fill" style="width:${pyqItems.length?pyqVisited/pyqItems.length*100:0}%;background:var(--danger)"></div></div>
      </div>
    </div>

    <div class="dash-section">
      <h3>Categories ${S.dashFilter?`<button onclick="S.dashFilter=null;render();" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;margin-left:6px">Clear Filter ✕</button>`:''}</h3>
      <div class="dash-grid">${catCards}</div>
    </div>

    <div class="dash-section">
      <h3>PYQ Locations</h3>
      <div class="dash-list">${pyqList||'<p style="color:var(--text-muted);font-size:11px;padding:8px">No PYQ locations in this mode</p>'}</div>
    </div>

    <div class="dash-section">
      <div class="dash-grid">
        <button class="dash-card dash-card-full" onclick="startSlideshow()" style="border-color:var(--success)">
          <div class="dash-card-icon">▶️</div>
          <div class="dash-card-label" style="color:var(--success);font-weight:600">START AUTO-REVISION (10s each)</div>
        </button>
      </div>
    </div>
  </div>`;
}

function detailHTML(m){
  const c=CAT[m.type]||CAT.custom;
  const slideNav=S.slideshow?`<div class="slide-nav">
    <button onclick="slidePrev()">← Previous</button>
    <button onclick="slideNext()">Next →</button>
  </div>`:'';
  return `<div class="panel">
    <button class="panel-close" id="pc">← Back</button>
    <div class="detail-head" style="border-left-color:${c.color}">
      <span class="detail-icon">${c.icon}</span>
      <div>
        <h2>${m.name}</h2>
        <span class="badge" style="background:${c.color}">${c.label}</span>
        ${m.type==='pyq'||m.upscRelevance?.includes('PYQ')?'<span class="badge badge-pyq">PYQ</span>':''}
      </div>
    </div>
    <div class="detail-coords">📍 ${m.lat.toFixed(4)}°, ${m.lng.toFixed(4)}°</div>
    ${m.info?`<div class="info-box"><h3 style="color:var(--accent)">📋 Key Information</h3><p>${m.info}</p></div>`:''}
    ${m.upscRelevance?`<div class="info-box upsc"><h3>🎯 UPSC Relevance</h3><p>${m.upscRelevance}</p></div>`:''}
    ${m.notes?`<div class="info-box notes"><h3>📝 Your Notes</h3><p>${m.notes}</p></div>`:''}
    ${m.isCustom?`<button class="del-btn" id="del-c" data-id="${m.id}">🗑️ Delete</button>`:''}
    ${slideNav}
  </div>`;
}

function quizHTML(){
  const qs=quizData.filter(q=>q.region===S.mode);
  if(!qs.length)return'<div class="panel"><p style="padding:32px;text-align:center;color:var(--text-dim)">No questions.</p></div>';
  const q=qs[S.qi%qs.length];
  const opts=q.opts.map((o,i)=>{let c='qo';if(S.qshow){if(i===q.ans)c+=' correct';else if(i===S.qsel)c+=' wrong';}return`<button class="${c}" data-qi="${i}"><span class="qo-letter">${'ABCD'[i]}</span>${o}</button>`;}).join('');
  return`<div class="panel"><div class="quiz-head"><h2>🧠 Quiz</h2><button class="panel-close" id="cq">✕</button></div>
    <div class="quiz-score">Score: ${S.qs}/${S.qa} ${S.qa?`(${Math.round(S.qs/S.qa*100)}%)`:''} — Q${(S.qi%qs.length)+1}/${qs.length}</div>
    <div class="quiz-q"><p class="quiz-q-text">${q.q}</p><div class="quiz-opts">${opts}</div>
    ${S.qshow?`<div class="quiz-exp"><strong>${S.qsel===q.ans?'✅ Correct!':'❌ Incorrect'}</strong><p>${q.exp}</p><button class="btn btn-primary" id="nq">Next →</button></div>`:''}</div></div>`;
}

function notesHTML(){
  const list=S.notes.length?S.notes.map(n=>`<div class="note-card"><div class="note-top"><h3>${n.title}</h3><span class="note-date">${new Date(n.date).toLocaleDateString()}</span></div><p>${n.content}</p><button class="note-del" data-nd="${n.id}">Delete</button></div>`).join(''):'<p style="text-align:center;color:var(--text-muted);padding:24px">No notes yet.</p>';
  return`<div class="panel"><div class="notes-head"><h2>📝 Notes</h2><button class="panel-close" id="cn">✕</button></div>
    <div class="notes-form"><input id="nt" placeholder="Title..."><textarea id="nc" placeholder="Note..." rows="3"></textarea><button class="btn btn-primary" id="an">Add</button></div><div>${list}</div></div>`;
}

function modalHTML(lat,lng){
  const opts=Object.entries(CAT).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join('');
  return`<div class="modal-overlay" id="mo"><div class="modal" onclick="event.stopPropagation()">
    <h2>Add Place</h2><div class="modal-coords">📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
    <label>Name *<input id="mn" placeholder="e.g., Doklam" autofocus></label>
    <label>Category<select id="mt">${opts}</select></label>
    <label>Information<textarea id="mi" rows="3"></textarea></label>
    <label>UPSC Relevance<textarea id="mu" rows="2"></textarea></label>
    <label>Notes<textarea id="mp" rows="2"></textarea></label>
    <div class="modal-actions"><button class="btn btn-secondary" id="mc-cancel">Cancel</button><button class="btn btn-primary" id="mc-save">Add</button></div>
  </div></div>`;
}

// ═══ MAP ═══
function initMap(){
  const c=S.mode==='india'?[22.5,82]:[20,10];
  const z=S.mode==='india'?5:2;
  const tileUrl=S.theme==='dark'?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  S.map=L.map('map',{zoomControl:false}).setView(c,z);
  L.control.zoom({position:'bottomright'}).addTo(S.map);
  L.tileLayer(tileUrl,{attribution:'© OSM © CARTO',maxZoom:18}).addTo(S.map);
  S.map.on('click',e=>{if(S.adding){S.adding=false;showModal(e.latlng.lat,e.latlng.lng);}});
  placeMarkers();
}

function mkIcon(type,active){
  const c=CAT[type]||CAT.custom,s=active?34:26;
  return L.divIcon({className:'custom-marker',
    html:`<div style="width:${s}px;height:${s}px;background:${c.color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${active?16:12}px;border:${active?'3px solid #fff':'2px solid rgba(255,255,255,0.7)'};box-shadow:${active?'0 0 16px rgba(0,0,0,0.6)':'0 2px 8px rgba(0,0,0,0.4)'};cursor:pointer">${c.icon}</div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

function placeMarkers(){
  S.markers.forEach(m=>m.remove());S.markers=[];
  filtered().forEach(m=>{
    const mk=L.marker([m.lat,m.lng],{icon:mkIcon(m.type,S.selected?.id===m.id)}).addTo(S.map).on('click',()=>selectPlace(m));
    S.markers.push(mk);
  });
}

function selectPlace(m){
  S.selected=m;S.panel='detail';
  S.visited.add(m.id);save();
  document.getElementById('sp').innerHTML=detailHTML(m);
  S.map.flyTo([m.lat,m.lng],Math.max(S.map.getZoom(),7),{duration:0.6});
  document.getElementById('pc')?.addEventListener('click',closePanel);
  document.getElementById('del-c')?.addEventListener('click',e=>{S.custom=S.custom.filter(c=>c.id!==e.target.dataset.id);save();closePanel();placeMarkers();});
  // Update dashboard visited counts
  const dash=document.querySelector('.dashboard');
  if(dash){const counts={};all().forEach(m2=>counts[m2.type]=(counts[m2.type]||0)+1);dash.outerHTML=dashboardHTML(counts);attachDashEV();}
}

function closePanel(){S.panel=null;S.selected=null;document.getElementById('sp').innerHTML='';}

function showModal(lat,lng){
  document.getElementById('mc').innerHTML=modalHTML(lat,lng);
  document.getElementById('mo').addEventListener('click',()=>{document.getElementById('mc').innerHTML='';});
  document.getElementById('mc-cancel').addEventListener('click',()=>{document.getElementById('mc').innerHTML='';});
  document.getElementById('mc-save').addEventListener('click',()=>{
    const name=document.getElementById('mn').value.trim();if(!name)return alert('Name required');
    S.custom.push({id:'c-'+Date.now(),name,lat,lng,type:document.getElementById('mt').value,info:document.getElementById('mi').value.trim(),upscRelevance:document.getElementById('mu').value.trim(),notes:document.getElementById('mp').value.trim(),isCustom:true});
    save();document.getElementById('mc').innerHTML='';placeMarkers();render();
  });
}

// ═══ GLOBAL FUNCTIONS ═══
window.toggleTheme=function(){S.theme=S.theme==='dark'?'light':'dark';document.body.dataset.theme=S.theme;save();render();};
window.changeFontSize=function(d){S.fontSize=Math.max(10,Math.min(20,S.fontSize+d));updateFontSize();save();};
window.startSlideshow=startSlideshow;
window.slidePrev=slidePrev;
window.slideNext=slideNext;
window.pdfSelectAll=pdfSelectAll;
window.generatePdf=generatePdf;

// ═══ EVENTS ═══
function landingEV(){
  document.getElementById('go-india').addEventListener('click',()=>{S.mode='india';render();});
  document.getElementById('go-world').addEventListener('click',()=>{S.mode='world';render();});
  document.getElementById('import-file')?.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.custom)S.custom=[...S.custom,...d.custom];if(d.customMarkers)S.custom=[...S.custom,...d.customMarkers];if(d.notes)S.notes=[...d.notes,...S.notes];save();alert('Imported!');}catch{alert('Invalid file');}};
    r.readAsText(f);
  });
}

function attachDashEV(){
  document.querySelectorAll('[data-dc]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.dashFilter=S.dashFilter===el.dataset.dc?null:el.dataset.dc;
      placeMarkers();render();
    });
  });
  document.querySelectorAll('[data-di]').forEach(el=>{
    el.addEventListener('click',()=>{const m=all().find(x=>x.id===el.dataset.di);if(m)selectPlace(m);});
  });
}

function appEV(){
  document.getElementById('go-back').addEventListener('click',()=>{stopSlideshow();S.mode=null;S.map=null;S.panel=null;S.dashFilter=null;render();});
  document.getElementById('m-india').addEventListener('click',()=>{if(S.mode!=='india'){stopSlideshow();S.mode='india';S.selected=null;S.panel=null;S.dashFilter=null;render();}});
  document.getElementById('m-world').addEventListener('click',()=>{if(S.mode!=='world'){stopSlideshow();S.mode='world';S.selected=null;S.panel=null;S.dashFilter=null;render();}});
  document.getElementById('b-add').addEventListener('click',()=>{S.adding=!S.adding;render();});
  document.getElementById('b-slide').addEventListener('click',()=>{S.slideshow?stopSlideshow():startSlideshow();});
  document.getElementById('b-quiz').addEventListener('click',()=>{
    if(S.panel==='quiz'){closePanel();return;}
    S.panel='quiz';S.qi=0;S.qs=0;S.qa=0;S.qsel=null;S.qshow=false;
    document.getElementById('sp').innerHTML=quizHTML();quizEV();
  });
  document.getElementById('b-notes').addEventListener('click',()=>{
    if(S.panel==='notes'){closePanel();return;}S.panel='notes';
    document.getElementById('sp').innerHTML=notesHTML();notesEV();
  });
  document.getElementById('b-pdf').addEventListener('click',showPdfModal);
  document.getElementById('b-export').addEventListener('click',()=>{
    const d={custom:S.custom,notes:S.notes,visited:[...S.visited]};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download=`atlas-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);
  });
  // Filters
  document.querySelectorAll('[data-f]').forEach(b=>{
    b.addEventListener('click',()=>{S.filters[b.dataset.f]=!S.filters[b.dataset.f];S.dashFilter=null;placeMarkers();render();});
  });
  // Search
  const si=document.getElementById('si'),sr=document.getElementById('sr');
  si.addEventListener('input',()=>{
    const q=si.value.toLowerCase().trim();if(!q){sr.classList.remove('open');return;}
    const m=all().filter(x=>x.name.toLowerCase().includes(q)||x.info?.toLowerCase().includes(q)).slice(0,12);
    if(!m.length){sr.classList.remove('open');return;}sr.classList.add('open');
    sr.innerHTML=m.map(x=>{const c=CAT[x.type]||CAT.custom;return`<button class="sr" data-sid="${x.id}"><span style="color:${c.color}">${x.icon||c.icon}</span><span>${x.name}</span><span class="sr-type">${c.label}</span></button>`;}).join('');
    sr.querySelectorAll('[data-sid]').forEach(b=>{b.addEventListener('click',()=>{const mk=all().find(x=>x.id===b.dataset.sid);if(mk)selectPlace(mk);si.value='';sr.classList.remove('open');});});
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))sr.classList.remove('open');});
  // Dashboard
  attachDashEV();
}

function quizEV(){
  const qs=quizData.filter(q=>q.region===S.mode);
  document.querySelectorAll('[data-qi]').forEach(b=>{
    b.addEventListener('click',()=>{if(S.qshow)return;S.qsel=parseInt(b.dataset.qi);S.qshow=true;S.qa++;if(S.qsel===qs[S.qi%qs.length].ans)S.qs++;document.getElementById('sp').innerHTML=quizHTML();quizEV();});
  });
  document.getElementById('nq')?.addEventListener('click',()=>{S.qi++;S.qsel=null;S.qshow=false;document.getElementById('sp').innerHTML=quizHTML();quizEV();});
  document.getElementById('cq')?.addEventListener('click',closePanel);
}

function notesEV(){
  document.getElementById('an')?.addEventListener('click',()=>{const t=document.getElementById('nt').value.trim(),c=document.getElementById('nc').value.trim();if(!t)return;S.notes.unshift({id:'n-'+Date.now(),title:t,content:c,date:new Date().toISOString()});save();document.getElementById('sp').innerHTML=notesHTML();notesEV();});
  document.querySelectorAll('[data-nd]').forEach(b=>{b.addEventListener('click',()=>{S.notes=S.notes.filter(n=>n.id!==b.dataset.nd);save();document.getElementById('sp').innerHTML=notesHTML();notesEV();});});
  document.getElementById('cn')?.addEventListener('click',closePanel);
}

render();
</script>
</body>
</html>
