<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC GeoPrep — Geography & Mapping</title>
<meta name="description" content="Interactive geography prep tool for UPSC CSE. 100+ locations, PYQ mapping, quizzes, revision notes.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0B0E14;
  --surface: #141820;
  --surface2: #1C2130;
  --surface3: #252B3B;
  --border: #2A3044;
  --border-light: #353D56;
  --text: #E4E6ED;
  --text-dim: #8690A8;
  --text-muted: #5A637A;
  --accent: #3B82F6;
  --accent-soft: rgba(59,130,246,0.12);
  --accent2: #8B5CF6;
  --accent2-soft: rgba(139,92,246,0.12);
  --success: #22C55E;
  --danger: #EF4444;
  --warning: #F59E0B;
  --warning-soft: rgba(245,158,11,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 5px;
  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Outfit', -apple-system, sans-serif;
  --shadow-md: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
button { font-family: var(--font-body); }

/* ═══ LANDING ═══ */
.landing { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: auto; padding: 40px 20px; }
.landing-bg { position: fixed; inset: 0; background: var(--bg); }
.landing-bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 30% 30%, rgba(59,130,246,0.08) 0%, transparent 70%), radial-gradient(ellipse 60% 50% at 75% 70%, rgba(139,92,246,0.06) 0%, transparent 70%); }
.landing-bg::after { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 80px 80px; }
.landing-content { position: relative; z-index: 1; text-align: center; max-width: 860px; }
.landing-badge { display: inline-flex; align-items: center; gap: 8px; padding: 7px 18px; border: 1px solid var(--border); border-radius: 24px; font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 28px; }
.landing-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.landing-title { font-family: var(--font-display); font-size: clamp(52px, 9vw, 88px); font-weight: 400; line-height: 1.05; margin-bottom: 20px; letter-spacing: -1px; }
.landing-geo { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.landing-subtitle { font-size: 17px; color: var(--text-dim); line-height: 1.8; margin-bottom: 44px; font-weight: 300; max-width: 600px; margin-left: auto; margin-right: auto; }
.landing-cards { display: flex; gap: 20px; justify-content: center; margin-bottom: 44px; flex-wrap: wrap; }
.landing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 30px; width: 300px; text-align: left; cursor: pointer; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); color: var(--text); position: relative; overflow: hidden; }
.landing-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent-soft), transparent 60%); opacity: 0; transition: opacity 0.35s; }
.landing-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 20px 60px rgba(59,130,246,0.12); }
.landing-card:hover::before { opacity: 1; }
.landing-card-icon { font-size: 44px; margin-bottom: 14px; position: relative; }
.landing-card h2 { font-family: var(--font-display); font-size: 30px; font-weight: 400; margin-bottom: 8px; position: relative; }
.landing-card p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; position: relative; font-weight: 300; }
.landing-card-count { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; position: relative; }
.landing-features { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; }
.landing-feat { padding: 8px 16px; background: var(--surface); border-radius: 24px; font-size: 13px; color: var(--text-dim); border: 1px solid var(--border); font-weight: 300; }
.landing-footer { font-size: 12px; color: var(--text-muted); font-weight: 300; }
.landing-import { margin-top: 16px; }
.landing-import label { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px dashed var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
.landing-import label:hover { border-color: var(--accent); color: var(--accent); }
.landing-import input { display: none; }

/* ═══ APP SHELL ═══ */
.app { height: 100vh; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; gap: 10px; padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-back { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px; padding: 6px 8px; border-radius: var(--radius-xs); transition: background 0.15s; }
.topbar-back:hover { background: var(--surface2); }
.topbar-logo { font-family: var(--font-display); font-size: 18px; color: var(--text); }
.geo-text { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.mode-toggle { display: flex; gap: 2px; background: var(--bg); border-radius: var(--radius-xs); padding: 2px; }
.mode-toggle button { background: none; border: none; color: var(--text-dim); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; }
.mode-toggle button.active { background: var(--accent); color: #fff; }
.topbar-center { flex: 1; display: flex; justify-content: center; }
.topbar-right { display: flex; align-items: center; gap: 5px; }
.tb { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: var(--radius-xs); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
.tb:hover { background: var(--surface3); }
.tb.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tb.adding { background: var(--danger); border-color: var(--danger); color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.35)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }

.add-banner { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; text-align: center; padding: 7px; font-size: 12px; font-weight: 500; letter-spacing: 0.3px; flex-shrink: 0; }

/* ═══ SEARCH ═══ */
.search-box { position: relative; width: 100%; max-width: 380px; }
.search-wrap { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 0 10px; transition: border-color 0.2s; }
.search-wrap:focus-within { border-color: var(--accent); }
.search-wrap input { flex: 1; background: none; border: none; color: var(--text); padding: 7px 0 7px 6px; font-size: 12px; outline: none; font-family: var(--font-body); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon { font-size: 13px; color: var(--text-muted); }
.search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); max-height: 340px; overflow-y: auto; box-shadow: var(--shadow-lg); z-index: 2000; display: none; }
.search-results.open { display: block; }
.sr { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; background: none; border: none; border-bottom: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 12px; text-align: left; transition: background 0.12s; font-family: var(--font-body); }
.sr:last-child { border-bottom: none; }
.sr:hover { background: var(--surface2); }
.sr-type { margin-left: auto; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ═══ FILTERS ═══ */
.filters { display: flex; align-items: center; gap: 6px; padding: 5px 14px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 999; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.chip { display: flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 14px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.chip.on { color: #fff; border-color: transparent; }
.chip-ct { font-size: 9px; opacity: 0.7; }

/* ═══ MAP ═══ */
.map-area { flex: 1; position: relative; overflow: hidden; }
#map { height: 100%; width: 100%; }
.leaflet-top, .leaflet-bottom { z-index: 800 !important; }
.custom-marker { background: none !important; border: none !important; }

/* ═══ SIDE PANEL ═══ */
.panel { position: absolute; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 900; overflow-y: auto; box-shadow: -6px 0 40px rgba(0,0,0,0.4); animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1); padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.panel::-webkit-scrollbar { width: 5px; }
.panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.panel-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 12px; border-radius: var(--radius-xs); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; margin-bottom: 16px; }
.panel-close:hover { background: var(--surface3); color: var(--text); }

/* Detail */
.detail-head { display: flex; align-items: flex-start; gap: 14px; padding: 18px; margin-bottom: 16px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 4px solid var(--accent); }
.detail-icon { font-size: 34px; flex-shrink: 0; }
.detail-head h2 { font-family: var(--font-display); font-size: 24px; font-weight: 400; margin-bottom: 8px; line-height: 1.2; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
.badge-pyq { background: var(--danger); margin-left: 6px; }
.detail-coords { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-bottom: 14px; letter-spacing: 0.5px; }
.info-box { background: var(--bg); border-radius: var(--radius-sm); padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
.info-box h3 { font-size: 12px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.info-box p { font-size: 13px; line-height: 1.75; color: var(--text); font-weight: 300; }
.info-box.upsc { border-color: var(--warning); background: var(--warning-soft); }
.info-box.upsc h3 { color: var(--warning); }
.info-box.notes { border-color: var(--accent2); background: var(--accent2-soft); }
.info-box.notes h3 { color: var(--accent2); }
.del-btn { padding: 7px 16px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius-xs); cursor: pointer; font-size: 12px; font-weight: 500; margin-top: 8px; }

/* ═══ QUIZ ═══ */
.quiz-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.quiz-head h2 { font-family: var(--font-display); font-size: 22px; }
.quiz-score { text-align: center; padding: 8px; background: var(--bg); border-radius: var(--radius-xs); font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--accent); border: 1px solid var(--border); }
.quiz-q { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; }
.quiz-q-text { font-size: 14px; line-height: 1.75; margin-bottom: 16px; white-space: pre-line; font-weight: 300; }
.quiz-opts { display: flex; flex-direction: column; gap: 7px; }
.qo { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); cursor: pointer; font-size: 13px; text-align: left; transition: all 0.18s; font-family: var(--font-body); font-weight: 300; }
.qo:hover { border-color: var(--accent); background: var(--surface2); }
.qo.correct { border-color: var(--success); background: rgba(34,197,94,0.08); }
.qo.wrong { border-color: var(--danger); background: rgba(239,68,68,0.08); }
.qo-letter { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); font-size: 11px; font-weight: 600; flex-shrink: 0; }
.quiz-exp { margin-top: 14px; padding: 14px; background: var(--surface); border-radius: var(--radius-xs); border: 1px solid var(--border); }
.quiz-exp strong { display: block; margin-bottom: 6px; font-size: 14px; }
.quiz-exp p { font-size: 13px; line-height: 1.65; color: var(--text-dim); margin-bottom: 12px; font-weight: 300; }
.btn { padding: 8px 18px; border-radius: var(--radius-xs); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; font-family: var(--font-body); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.1); }

/* ═══ NOTES ═══ */
.notes-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.notes-head h2 { font-family: var(--font-display); font-size: 22px; }
.notes-form { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.notes-form input, .notes-form textarea { padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 13px; outline: none; font-family: var(--font-body); transition: border-color 0.2s; }
.notes-form input:focus, .notes-form textarea:focus { border-color: var(--accent); }
.note-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 14px; margin-bottom: 8px; }
.note-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.note-top h3 { font-size: 13px; font-weight: 600; }
.note-date { font-size: 10px; color: var(--text-muted); }
.note-card p { font-size: 12px; color: var(--text-dim); line-height: 1.6; font-weight: 300; }
.note-del { background: none; border: none; color: var(--danger); font-size: 11px; cursor: pointer; margin-top: 6px; font-family: var(--font-body); }

/* ═══ MODAL ═══ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(4px); }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal h2 { font-family: var(--font-display); font-size: 24px; margin-bottom: 4px; }
.modal-coords { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-bottom: 18px; }
.modal label { display: block; font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal input, .modal textarea, .modal select { display: block; width: 100%; margin-top: 5px; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 13px; outline: none; font-family: var(--font-body); transition: border-color 0.2s; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-secondary { background: var(--surface2); color: var(--text); }

/* ═══ STATS BAR ═══ */
.stats { display: flex; gap: 16px; justify-content: center; padding: 5px 14px; background: var(--surface); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); z-index: 1000; flex-shrink: 0; font-weight: 300; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .topbar { flex-wrap: wrap; gap: 6px; }
  .topbar-center { order: 3; flex-basis: 100%; }
  .panel { width: 100%; }
  .landing-cards { flex-direction: column; align-items: center; }
  .topbar-right { flex-wrap: wrap; }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
// UPSC GeoPrep — Comprehensive Geography & Mapping Tool
// ═══════════════════════════════════════════════════════════

const INDIA_CENTER = [22.5, 82.0];
const WORLD_CENTER = [20, 10];
const INDIA_ZOOM = 5;
const WORLD_ZOOM = 2;

const CAT = {
  city:     { color:'#2563EB', icon:'🏙️', label:'City' },
  river:    { color:'#0891B2', icon:'🌊', label:'River' },
  mountain: { color:'#7C3AED', icon:'⛰️', label:'Mountain' },
  pass:     { color:'#DC2626', icon:'🏔️', label:'Pass' },
  strait:   { color:'#0D9488', icon:'🌀', label:'Strait' },
  lake:     { color:'#0284C7', icon:'💧', label:'Lake' },
  island:   { color:'#059669', icon:'🏝️', label:'Island' },
  desert:   { color:'#D97706', icon:'🏜️', label:'Desert' },
  plateau:  { color:'#92400E', icon:'🗻', label:'Plateau' },
  canal:    { color:'#0E7490', icon:'⚓', label:'Canal/Water' },
  boundary: { color:'#BE185D', icon:'🔲', label:'Boundary' },
  pyq:      { color:'#E11D48', icon:'📝', label:'PYQ' },
  custom:   { color:'#6D28D9', icon:'📌', label:'Custom' },
};

// ═══ INDIA DATA ═══
const indiaData = [
  // CITIES
  {id:'ic1',name:'New Delhi',lat:28.6139,lng:77.209,type:'city',info:'National capital. Seat of Parliament, Supreme Court, Rashtrapati Bhavan. On Yamuna River. Lutyens\' design. UNESCO: Qutub Minar, Humayun\'s Tomb, Red Fort.',upscRelevance:'Constitutional bodies HQ. UNESCO sites. NCT status — unique governance.'},
  {id:'ic2',name:'Mumbai',lat:19.076,lng:72.8777,type:'city',info:'Financial capital. RBI HQ, BSE, NSE, SEBI. Western coast (Konkan). Natural harbour. Elephanta Caves UNESCO.',upscRelevance:'RBI, stock exchanges, SEBI — Economy questions. Gateway of India. Western Ghats proximity.'},
  {id:'ic3',name:'Kolkata',lat:22.5726,lng:88.3639,type:'city',info:'Former British capital (till 1911). On Hooghly. Only riverine major port. Victoria Memorial.',upscRelevance:'Bengal Renaissance, Partition history. Ganga-Brahmaputra delta. Sundarbans gateway.'},
  {id:'ic4',name:'Chennai',lat:13.0827,lng:80.2707,type:'city',info:'Tamil Nadu capital. Coromandel Coast. "Detroit of India" (auto industry). Mahabalipuram UNESCO nearby.',upscRelevance:'Cyclone-prone coast. Dravidian architecture. Bharatanatyam. Auto industry hub.'},
  {id:'ic5',name:'Bengaluru',lat:12.9716,lng:77.5946,type:'city',info:'Karnataka capital. IT capital. HQ of ISRO, HAL, NAL. Deccan Plateau (~920m). Pleasant climate.',upscRelevance:'ISRO HQ — space missions. HAL — defence. Deccan Plateau geography.'},
  {id:'ic6',name:'Leh',lat:34.1526,lng:77.5771,type:'city',info:'Capital of Ladakh UT. ~3,500m. Indus Valley. Cold desert. Near LAC. Buddhist monasteries.',upscRelevance:'Cold desert ecosystem. India-China LAC. Galwan Valley. Pangong Tso.'},
  {id:'ic7',name:'Varanasi',lat:25.3176,lng:83.006,type:'city',info:'One of world\'s oldest cities. Holy city on Ganga. Sarnath nearby — Buddha\'s first sermon.',upscRelevance:'Ganga ghats — cultural heritage. Buddhist history. Silk weaving GI.'},
  {id:'ic8',name:'Port Blair',lat:11.6234,lng:92.7265,type:'city',info:'Capital of A&N Islands. Cellular Jail (freedom struggle). Only tri-service command (Andaman & Nicobar Command).',upscRelevance:'Strategic location near Malacca. Tri-service command. Cellular Jail — freedom struggle.'},
  {id:'ic9',name:'Hyderabad',lat:17.385,lng:78.4867,type:'city',info:'Telangana capital. DRDO labs. Charminar. Deccan Plateau. Pharma hub ("Vaccine Capital").',upscRelevance:'Pharma/biotech hub. Charminar — Qutb Shahi architecture. Nizam history.'},

// Load
try {
  const d = JSON.parse(localStorage.getItem('geoprep') || '{}');
  if (d.custom) S.custom = d.custom;
  if (d.notes) S.notes = d.notes;
} catch(e) {}

function save() { localStorage.setItem('geoprep', JSON.stringify({ custom: S.custom, notes: S.notes })); }
function data() { return S.mode === 'india' ? indiaData : worldData; }
function all() {
  return [...data(), ...S.custom.filter(m => {
    if (S.mode === 'india') return m.lat > 5 && m.lat < 38 && m.lng > 65 && m.lng < 100;
    return true;
  })];
}
function filtered() { return all().filter(m => S.filters[m.type] !== false); }

function render() {
  const root = document.getElementById('root');
  if (!S.mode) { root.innerHTML = landingHTML(); landingEV(); }
  else { root.innerHTML = appHTML(); initMap(); appEV(); }
}

function appHTML() {
  const a = all(), counts = {};
  a.forEach(m => counts[m.type] = (counts[m.type]||0)+1);
  const chips = Object.entries(CAT).map(([k,v]) => {
    if (!counts[k]) return '';
    return `<button class="chip ${S.filters[k]?'on':''}" data-f="${k}" style="${S.filters[k]?`background:${v.color};border-color:${v.color}`:''}">${v.icon} ${v.label} <span class="chip-ct">${counts[k]}</span></button>`;
  }).join('');

  return `<div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-back" id="go-back">← <span class="topbar-logo"><span class="geo-text">Geo</span>Prep</span></button>
        <div class="mode-toggle">
          <button class="${S.mode==='india'?'active':''}" id="m-india">🇮🇳 India</button>
          <button class="${S.mode==='world'?'active':''}" id="m-world">🌍 World</button>
        </div>
      </div>
      <div class="topbar-center">
        <div class="search-box">
          <div class="search-wrap"><span class="search-icon">🔍</span><input id="si" placeholder="Search places, rivers, mountains..." autocomplete="off"></div>
          <div class="search-results" id="sr"></div>

      </div>
      <div class="topbar-right">
        <button class="tb ${S.panel==='quiz'?'active':''}" id="b-quiz">🧠 Quiz</button>

        <button class="tb ${S.adding?'adding':''}" id="b-add">${S.adding?'✕ Cancel':'📌 Add'}</button>
        <button class="tb" id="b-export" title="Export data">💾</button>
      </div>
    </header>
    ${S.adding?'<div class="add-banner">Click anywhere on the map to add a new place</div>':''}
    <div class="filters">${chips}</div>
    <div class="map-area"><div id="map"></div><div id="sp"></div></div>
    <div class="stats">
      <span>📍 ${filtered().length} places shown</span>
      <span>📌 ${S.custom.length} custom</span>
      <span>📝 ${S.notes.length} notes</span>

}

function quizHTML() {
  const qs = quizData.filter(q=>q.region===S.mode);
  if(!qs.length) return '<div class="panel"><p style="padding:32px;text-align:center;color:var(--text-dim)">No questions for this mode.</p></div>';
  const q = qs[S.qi % qs.length];
  const opts = q.opts.map((o,i)=>{
    let c='qo';
    if(S.qshow){if(i===q.ans)c+=' correct';else if(i===S.qsel)c+=' wrong';}
    return `<button class="${c}" data-qi="${i}"><span class="qo-letter">${'ABCD'[i]}</span>${o}</button>`;
  }).join('');
  return `<div class="panel">
    <div class="quiz-head"><h2>🧠 Quiz — ${S.mode==='india'?'India':'World'}</h2><button class="panel-close" id="cq">✕</button></div>
    <div class="quiz-score">Score: ${S.qs}/${S.qa} ${S.qa?`(${Math.round(S.qs/S.qa*100)}%)`:''} — Q${(S.qi%qs.length)+1}/${qs.length}</div>
    <div class="quiz-q">
      <p class="quiz-q-text">${q.q}</p>
      <div class="quiz-opts">${opts}</div>
      ${S.qshow?`<div class="quiz-exp">
        <strong>${S.qsel===q.ans?'✅ Correct!':'❌ Incorrect'}</strong>
        <p>${q.exp}</p>
        <button class="btn btn-primary" id="nq">Next Question →</button>
      </div>`:''}
    </div>
  </div>`;
}

      <div class="note-top"><h3>${n.title}</h3><span class="note-date">${new Date(n.date).toLocaleDateString()}</span></div>
      <p>${n.content}</p>

    </div>`).join('') : '<p style="text-align:center;color:var(--text-muted);padding:32px">No notes yet. Add revision notes to remember key facts!</p>';
  return `<div class="panel">

      <input id="nt" placeholder="Note title...">

}

function initMap() {
  const c = S.mode==='india'?INDIA_CENTER:WORLD_CENTER;
  const z = S.mode==='india'?INDIA_ZOOM:WORLD_ZOOM;
  S.map = L.map('map',{zoomControl:false}).setView(c,z);
  L.control.zoom({position:'bottomright'}).addTo(S.map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OSM © CARTO', maxZoom:18
  }).addTo(S.map);
  S.map.on('click',e=>{if(S.adding){S.adding=false;showModal(e.latlng.lat,e.latlng.lng);}});
  placeMarkers();
}

function mkIcon(type,active) {
  const c = CAT[type]||CAT.custom, s = active?34:26;
  return L.divIcon({
    className:'custom-marker',
    html:`<div style="width:${s}px;height:${s}px;background:${c.color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${active?16:12}px;border:${active?'3px solid #fff':'2px solid rgba(255,255,255,0.7)'};box-shadow:${active?'0 0 16px rgba(0,0,0,0.6)':'0 2px 8px rgba(0,0,0,0.4)'};cursor:pointer;transition:all 0.2s">${c.icon}</div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}

function placeMarkers() {
  S.markers.forEach(m=>m.remove());
  S.markers = [];
  filtered().forEach(m=>{
    const mk = L.marker([m.lat,m.lng],{icon:mkIcon(m.type,false)}).addTo(S.map).on('click',()=>selectPlace(m));
    S.markers.push(mk);
  });
}

function selectPlace(m) {
  S.selected = m;
  S.panel = 'detail';
  document.getElementById('sp').innerHTML = detailHTML(m);
  S.map.flyTo([m.lat,m.lng],Math.max(S.map.getZoom(),7),{duration:0.7});
  document.getElementById('pc')?.addEventListener('click',closePanel);
  document.getElementById('del-c')?.addEventListener('click',e=>{
    S.custom = S.custom.filter(c=>c.id!==e.target.dataset.id);
    save(); closePanel(); placeMarkers(); updateStats();
  });
}

function closePanel() { S.panel=null; S.selected=null; document.getElementById('sp').innerHTML=''; }
function updateStats() {
  const st = document.querySelector('.stats');
  if(st) st.innerHTML = `<span>📍 ${filtered().length} places shown</span><span>📌 ${S.custom.length} custom</span><span>📝 ${S.notes.length} notes</span>`;
}

function showModal(lat,lng) {
  document.getElementById('mc').innerHTML = modalHTML(lat,lng);
  document.getElementById('mo').addEventListener('click',()=>{document.getElementById('mc').innerHTML='';});
  document.getElementById('mc-cancel').addEventListener('click',()=>{document.getElementById('mc').innerHTML='';});
  document.getElementById('mc-save').addEventListener('click',()=>{
    const name = document.getElementById('mn').value.trim();
    if(!name) return alert('Name is required');
    S.custom.push({
      id:'c-'+Date.now(), name, lat, lng,
      type:document.getElementById('mt').value,
      info:document.getElementById('mi').value.trim(),
      upscRelevance:document.getElementById('mu').value.trim(),
      notes:document.getElementById('mp').value.trim(),
      isCustom:true
    });
    save();
    document.getElementById('mc').innerHTML='';
    placeMarkers(); updateStats();
  });
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function landingEV() {
  document.getElementById('go-india').addEventListener('click',()=>{S.mode='india';render();});
  document.getElementById('go-world').addEventListener('click',()=>{S.mode='world';render();});
  document.getElementById('import-file').addEventListener('change',e=>{
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if(d.custom) S.custom = [...S.custom,...d.custom];
        if(d.customMarkers) S.custom = [...S.custom,...d.customMarkers];
        if(d.notes) S.notes = [...d.notes,...S.notes];
        save();
        alert(`Imported! ${d.custom?.length||d.customMarkers?.length||0} places, ${d.notes?.length||0} notes.`);
      } catch(err) { alert('Invalid file format'); }
    };
    r.readAsText(f);
  });
}

function appEV() {
  document.getElementById('go-back').addEventListener('click',()=>{S.mode=null;S.map=null;S.panel=null;render();});
  document.getElementById('m-india').addEventListener('click',()=>{if(S.mode!=='india'){S.mode='india';S.selected=null;S.panel=null;render();}});
  document.getElementById('m-world').addEventListener('click',()=>{if(S.mode!=='world'){S.mode='world';S.selected=null;S.panel=null;render();}});

  document.getElementById('b-add').addEventListener('click',()=>{S.adding=!S.adding;render();});

  document.getElementById('b-quiz').addEventListener('click',()=>{
    if(S.panel==='quiz'){closePanel();return;}
    S.panel='quiz';S.qi=0;S.qs=0;S.qa=0;S.qsel=null;S.qshow=false;
    document.getElementById('sp').innerHTML=quizHTML();
    quizEV();
  });

  document.getElementById('b-notes').addEventListener('click',()=>{
    if(S.panel==='notes'){closePanel();return;}
    S.panel='notes';
    document.getElementById('sp').innerHTML=notesHTML();
    notesEV();
  });

  document.getElementById('b-export').addEventListener('click',()=>{
    const d={custom:S.custom,notes:S.notes};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u;a.download=`geoprep-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(u);
  });

  // Filters
  document.querySelectorAll('[data-f]').forEach(b=>{
    b.addEventListener('click',()=>{
      S.filters[b.dataset.f]=!S.filters[b.dataset.f];
      placeMarkers(); render();
    });
  });

  // Search
  const si=document.getElementById('si'), sr=document.getElementById('sr');
  si.addEventListener('input',()=>{
    const q=si.value.toLowerCase().trim();
    if(!q){sr.classList.remove('open');return;}
    const m=all().filter(x=>x.name.toLowerCase().includes(q)||x.info?.toLowerCase().includes(q)).slice(0,12);
    if(!m.length){sr.classList.remove('open');return;}
    sr.classList.add('open');
    sr.innerHTML=m.map(x=>{
      const c=CAT[x.type]||CAT.custom;
      return `<button class="sr" data-sid="${x.id}"><span style="color:${c.color}">${c.icon}</span><span>${x.name}</span><span class="sr-type">${c.label}</span></button>`;
    }).join('');
    sr.querySelectorAll('[data-sid]').forEach(b=>{
      b.addEventListener('click',()=>{
        const mk=all().find(x=>x.id===b.dataset.sid);
        if(mk)selectPlace(mk);
        si.value='';sr.classList.remove('open');
      });
    });
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))sr.classList.remove('open');});
}

function quizEV() {
  const qs=quizData.filter(q=>q.region===S.mode);
  document.querySelectorAll('[data-qi]').forEach(b=>{
    b.addEventListener('click',()=>{
      if(S.qshow)return;
      S.qsel=parseInt(b.dataset.qi);S.qshow=true;S.qa++;
      if(S.qsel===qs[S.qi%qs.length].ans)S.qs++;
      document.getElementById('sp').innerHTML=quizHTML();quizEV();
    });
  });
  document.getElementById('nq')?.addEventListener('click',()=>{
    S.qi++;S.qsel=null;S.qshow=false;
    document.getElementById('sp').innerHTML=quizHTML();quizEV();
  });
  document.getElementById('cq')?.addEventListener('click',closePanel);
}

function notesEV() {
  document.getElementById('an')?.addEventListener('click',()=>{
    const t=document.getElementById('nt').value.trim();
    const c=document.getElementById('nc').value.trim();
    if(!t)return;
    S.notes.unshift({id:'n-'+Date.now(),title:t,content:c,date:new Date().toISOString()});
    save();
    document.getElementById('sp').innerHTML=notesHTML();notesEV();updateStats();
  });
  document.querySelectorAll('[data-nd]').forEach(b=>{
    b.addEventListener('click',()=>{
      S.notes=S.notes.filter(n=>n.id!==b.dataset.nd);
      save();
      document.getElementById('sp').innerHTML=notesHTML();notesEV();updateStats();
    });
  });
  document.getElementById('cn')?.addEventListener('click',closePanel);
}

// Initialize
render();
</script>
</body>
</html>
